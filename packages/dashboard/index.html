<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233987e5' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M22 12h-4l-3 9L9 3l-3 9H2'/%3E%3C/svg%3E"
    />
    <title>OnCall AI</title>
    <meta name="color-scheme" content="dark light" />
    <script>
      // Set the theme before first paint (DESIGN_SPEC §11 "honor prefers-color-scheme
      // on first load"): stored preference wins, else the OS scheme.
      (function () {
        try {
          var stored = localStorage.getItem('oncall-theme');
          var prefersLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = stored || (prefersLight ? 'light' : 'dark');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
